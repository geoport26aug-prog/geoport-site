<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>GEOPORT 台帳ビュー</title>
<style>
  :root{
    --bg:#f4f6f9;--surface:#fff;--surface-2:#eef1f6;--ink:#1a2230;--ink-soft:#55627a;
    --ink-faint:#8b96ab;--line:#dfe4ec;--accent:#1b3a6b;--accent-soft:#e7edf6;
    --good:#1f7a5a;--warn:#b26a00;--warn-soft:#fbeeda;--crit:#b3341f;--crit-soft:#fbe4de;
    --star:#c98a12;--shadow:0 1px 2px rgba(26,34,48,.06),0 6px 20px rgba(26,34,48,.05);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0e131c;--surface:#172030;--surface-2:#1e293b;--ink:#eaf0f8;--ink-soft:#a7b3c8;
    --ink-faint:#6f7d95;--line:#26324a;--accent:#7da3e0;--accent-soft:#1c2c44;
    --good:#57c79a;--warn:#e0a349;--warn-soft:#33280f;--crit:#f0806a;--crit-soft:#37201c;
    --star:#e6b84e;--shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.25);
  }}
  :root[data-theme="light"]{--bg:#f4f6f9;--surface:#fff;--surface-2:#eef1f6;--ink:#1a2230;--ink-soft:#55627a;--ink-faint:#8b96ab;--line:#dfe4ec;--accent:#1b3a6b;--accent-soft:#e7edf6;--good:#1f7a5a;--warn:#b26a00;--warn-soft:#fbeeda;--crit:#b3341f;--crit-soft:#fbe4de;--star:#c98a12;--shadow:0 1px 2px rgba(26,34,48,.06),0 6px 20px rgba(26,34,48,.05);}
  :root[data-theme="dark"]{--bg:#0e131c;--surface:#172030;--surface-2:#1e293b;--ink:#eaf0f8;--ink-soft:#a7b3c8;--ink-faint:#6f7d95;--line:#26324a;--accent:#7da3e0;--accent-soft:#1c2c44;--good:#57c79a;--warn:#e0a349;--warn-soft:#33280f;--crit:#f0806a;--crit-soft:#37201c;--star:#e6b84e;--shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.25);}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:460px;margin:0 auto;padding:18px 16px 56px}
  .tnum{font-variant-numeric:tabular-nums}
  header.top{display:flex;align-items:baseline;justify-content:space-between;padding:6px 2px 16px}
  .brand{font-weight:700;letter-spacing:.02em;font-size:15px}.brand span{color:var(--accent)}
  .asof{font-size:12px;color:var(--ink-faint)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .stat{padding:15px 16px}
  .stat .label{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:7px}
  .stat .num{font-size:23px;font-weight:800;letter-spacing:-.01em}
  .stat .num .yen{font-size:15px;color:var(--ink-soft);font-weight:700;margin-right:1px}
  .stat .foot{font-size:11.5px;color:var(--ink-faint);margin-top:3px}
  .profit2{position:absolute;right:16px;top:14px;text-align:right}
  .profit2 .pv{font-size:16px;font-weight:700;color:var(--good);letter-spacing:.01em}
  .profit2 .pl{display:block;font-size:10px;color:var(--ink-faint);font-weight:600;margin-top:1px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  h2.sec{font-size:13px;font-weight:700;color:var(--ink-soft);letter-spacing:.04em;margin:0 4px 10px;display:flex;align-items:center;gap:8px}
  h2.sec .count{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:20px;padding:2px 9px}
  .list{padding:4px;margin-bottom:22px}
  .item{display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:10px;padding:10px 12px;border-radius:11px}
  .item+.item{border-top:1px solid var(--line)}
  .due{text-align:center;font-size:11px;font-weight:700;border-radius:8px;padding:5px 2px;line-height:1.25}
  .due small{display:block;font-size:9.5px;font-weight:600;opacity:.8}
  .due.n{background:var(--surface-2);color:var(--ink-soft)}
  .due.w{background:var(--warn-soft);color:var(--warn)}
  .due.c{background:var(--crit-soft);color:var(--crit)}
  .mid{min-width:0}
  .kata{font-weight:700;font-size:14px;letter-spacing:-.01em;display:flex;align-items:center;gap:6px}
  .kata .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .meta{font-weight:500;font-size:11.5px;color:var(--ink-faint);margin-top:1px}
  .sup{font-size:9px;line-height:1;color:var(--ink-faint);flex:none;opacity:.85}
  .ship{color:var(--star);font-size:12px;line-height:1;flex:none}.ship.no{color:var(--line)}
  .amt{text-align:right;font-weight:700;font-size:13.5px}
  .amt small{display:block;font-size:11px;color:var(--ink-faint);font-weight:600}
  .trend{padding:18px 18px 16px;margin-bottom:8px}
  .bars{display:flex;align-items:flex-end;gap:14px;height:130px;margin-top:8px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
  .bar .col{width:100%;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 70%,transparent));min-height:4px}
  .bar.cur .col{background:linear-gradient(180deg,var(--good),color-mix(in srgb,var(--good) 65%,transparent))}
  .bar .v{font-size:11px;font-weight:700;color:var(--ink-soft)}
  .bar .m{font-size:11.5px;font-weight:600;color:var(--ink-faint)}.bar.cur .m{color:var(--good)}
  .note{font-size:11.5px;color:var(--ink-faint);line-height:1.6;margin:2px 6px 0;padding-top:14px;border-top:1px dashed var(--line)}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}
  .gate .box{width:100%;max-width:320px;text-align:center}
  .gate h1{font-size:17px;margin:0 0 4px}.gate p{font-size:13px;color:var(--ink-faint);margin:0 0 18px}
  .gate input{width:100%;font-size:17px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink);text-align:center;letter-spacing:.1em}
  .gate button{width:100%;margin-top:10px;font-size:15px;font-weight:700;padding:13px;border:0;border-radius:12px;background:var(--accent);color:#fff}
  .gate .err{color:var(--crit);font-size:12.5px;margin-top:10px;min-height:16px}
  .hidden{display:none}
  .loading{padding:60px 0;text-align:center;color:var(--ink-faint);font-size:13px}
</style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="box">
      <h1>GEOPORT 台帳ビュー</h1>
      <p>合言葉を入力してください</p>
      <input id="pass" type="password" inputmode="text" autocomplete="off" autofocus>
      <button id="go">ひらく</button>
      <div class="err" id="err"></div>
    </div>
  </div>

  <div class="wrap hidden" id="app">
    <header class="top">
      <div class="brand">GEOPORT <span>台帳ビュー</span></div>
      <div class="asof tnum" id="asof"></div>
    </header>
    <div class="loading" id="loading">読み込み中…</div>
    <div id="content" class="hidden">
      <h2 class="sec">未納品リスト <span class="count" id="unBadge"></span></h2>
      <div class="card list" id="unList"></div>

      <h2 class="sec">今月のまとめ</h2>
      <div class="card stat" style="position:relative;margin-bottom:12px">
        <div class="label"><span class="month" id="mlabel"></span>に受けた注文</div>
        <div class="num tnum" id="oTotal"></div>
        <div class="foot tnum"><span id="oCount"></span> ／ 今月の受注</div>
        <div class="profit2"><span class="pv tnum" id="profit"></span><span class="pl tnum" id="profitN"></span></div>
      </div>
      <div class="row2" style="margin-bottom:22px">
        <div class="card stat">
          <div class="label"><span id="mlabel2"></span>の請求見込み</div>
          <div class="num tnum" id="bill"></div>
          <div class="foot">納品・検収が済んだ分</div>
        </div>
        <div class="card stat">
          <div class="label">未納品</div>
          <div class="num tnum" id="unCount"></div>
          <div class="foot tnum" id="unTotal"></div>
        </div>
      </div>

      <h2 class="sec">売上の推移 <span class="count">検収月ベース</span></h2>
      <div class="card trend"><div class="bars" id="bars"></div><p class="note" id="trendNote"></p></div>
    </div>
  </div>

<script>
  // ▼ 受付係（Supabase Edge Function）の場所。ここは秘密ではない（データは合鍵＋合言葉で守る）
  var API = 'https://vprtbkkqqdfidzvfwhzo.supabase.co/functions/v1/nl-dashboard';
  var K = new URLSearchParams(location.search).get('k') || '';

  var yen = function(n){ return '¥' + Number(n).toLocaleString('ja-JP'); };
  var plain = function(n){ return Number(n).toLocaleString('ja-JP'); };
  var supMark = function(s){ return ({Dong:'●',eBay:'▲','ヤフオク':'■','その他':'◆'})[s] || '·'; };
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function mmdd(iso){ if(!iso) return ''; var p=iso.split('-'); return (+p[1])+'/'+(+p[2]); }
  function dueInfo(n){
    if(n===null) return {cls:'n',t:'—'};
    if(n<0)  return {cls:'c',t:(-n)+'日超過'};
    if(n===0)return {cls:'w',t:'今日'};
    if(n<=3) return {cls:'w',t:'あと'+n+'日'};
    return {cls:'n',t:'あと'+n+'日'};
  }

  function render(d){
    document.getElementById('asof').textContent = (d.asof||'').replace(/-/g,'/') + ' 時点';
    document.getElementById('mlabel').textContent = d.month_label;
    document.getElementById('mlabel2').textContent = d.month_label;
    document.getElementById('oTotal').innerHTML = '<span class="yen">¥</span>' + plain(d.order_total);
    document.getElementById('oCount').textContent = d.order_count + '件';
    document.getElementById('profit').textContent = plain(d.gross_profit);
    document.getElementById('profitN').textContent = d.order_count + ' / ' + d.profit_known_count;
    document.getElementById('bill').innerHTML = '<span class="yen">¥</span>' + plain(d.billing_forecast);
    document.getElementById('unCount').innerHTML = d.unshipped_count + '<span style="font-size:14px;color:var(--ink-soft)">件</span>';
    document.getElementById('unTotal').textContent = yen(d.unshipped_total) + ' 分';
    document.getElementById('unBadge').textContent = '全' + d.unshipped_count + '件・納期順';

    var L = document.getElementById('unList'); L.innerHTML='';
    d.unshipped.forEach(function(x){
      var di = dueInfo(x.days_left);
      var el = document.createElement('div'); el.className='item';
      el.innerHTML =
        '<div class="due '+di.cls+'">'+di.t+'<small>'+mmdd(x.due_date)+'</small></div>'+
        '<div class="mid"><div class="kata">'+
          '<span class="ship'+(x.shipped?'':' no')+'">★</span>'+
          '<span class="sup">'+supMark(x.supplier)+'</span>'+
          '<span class="name">'+esc(x.kata)+'</span></div>'+
          '<div class="meta tnum">'+esc(x.item_name)+' ・ 受注 '+mmdd(x.order_date)+'</div></div>'+
        '<div class="amt tnum">'+yen(x.remain_amount)+'<small>'+x.remain_qty+'点</small></div>';
      L.appendChild(el);
    });

    var max = Math.max.apply(null, d.trend.map(function(t){return t.amount;}).concat([1]));
    var B = document.getElementById('bars'); B.innerHTML='';
    d.trend.forEach(function(t){
      var cur = (t.month === d.month_label);
      var h = Math.max(4, Math.round(t.amount/max*100));
      var m = (t.amount/1000000).toFixed(1);
      var el = document.createElement('div'); el.className='bar'+(cur?' cur':'');
      el.innerHTML = '<div class="v tnum">¥'+m+'M</div><div class="col" style="height:'+h+'%"></div><div class="m">'+esc(t.month)+'</div>';
      B.appendChild(el);
    });
    document.getElementById('trendNote').innerHTML =
      d.trend.map(function(t){return esc(t.month)+' '+yen(t.amount);}).join(' ／ ')+
      '<br>※ データは2026年5月途中から。集計途中の月は途中集計です。';

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
  }

  function load(pass){
    return fetch(API + '?k=' + encodeURIComponent(K), {
      headers: { 'x-view-pass': encodeURIComponent(pass) }
    }).then(function(r){
      if(r.status===401){ throw new Error('bad'); }
      if(!r.ok){ throw new Error('err'); }
      return r.json();
    });
  }

  function open(){
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }

  document.getElementById('go').addEventListener('click', submit);
  document.getElementById('pass').addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });

  function submit(){
    var p = document.getElementById('pass').value;
    var err = document.getElementById('err'); err.textContent='';
    load(p).then(function(d){
      try{ localStorage.setItem('nlpass', p); }catch(e){}
      open(); render(d);
    }).catch(function(){
      err.textContent = '合言葉が違います';
    });
  }

  (function(){
    var saved=''; try{ saved=localStorage.getItem('nlpass')||''; }catch(e){}
    if(saved){
      load(saved).then(function(d){ open(); render(d); }).catch(function(){});
    }
  })();
</script>
</body>
</html>
